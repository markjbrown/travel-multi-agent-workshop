name: TravelAssistant
metadata:
  template: azd-init@1.5.1
services:
  mcp-server:
    host: containerapp
    language: python
    docker:
      path: ./Dockerfile.mcp
      context: .
  api:
    host: containerapp
    language: python
    docker:
      path: ./Dockerfile.api
      context: .
  frontend:
    host: containerapp
    language: ts
    docker:
      path: ./Dockerfile.frontend
      context: .
hooks:
  preprovision:
    posix:
      shell: sh
      interactive: false
      continueOnError: false
      run: |
        # Check if OWNER_EMAIL is already set in azd environment
        EXISTING_OWNER=$(azd env get-value OWNER_EMAIL 2>/dev/null || echo "")
        if [ -z "$EXISTING_OWNER" ]; then
          CURRENT_USER=$(az account show --query user.name -o tsv 2>/dev/null || echo "user@example.com")
          echo "Auto-setting OWNER_EMAIL to: $CURRENT_USER"
          azd env set OWNER_EMAIL "$CURRENT_USER"
        else
          echo "OWNER_EMAIL already set to: $EXISTING_OWNER"
        fi
    windows:
      shell: pwsh
      interactive: false
      continueOnError: false
      run: |
        # Set OWNER_EMAIL from current Azure user
        try {
          $currentUser = az account show --query user.name -o tsv
          if ($currentUser -and $currentUser.Trim() -ne "") {
            Write-Host "Setting OWNER_EMAIL to: $($currentUser.Trim())"
            azd env set OWNER_EMAIL $currentUser.Trim()
          } else {
            Write-Host "Could not get current user, setting default"
            azd env set OWNER_EMAIL "user@example.com"
          }
        } catch {
          Write-Host "Could not get current user, setting default"
          azd env set OWNER_EMAIL "user@example.com"
        }
  postprovision:
    posix:
      shell: sh
      interactive: true
      continueOnError: false
      run: |
        echo "
        COSMOSDB_ENDPOINT=\"$COSMOSDB_ENDPOINT\"
        COSMOS_DB_DATABASE_NAME=\"TravelAssistant\"
        AZURE_OPENAI_ENDPOINT=\"$AZURE_OPENAI_ENDPOINT\"
        AZURE_OPENAI_EMBEDDING_DEPLOYMENT=\"$AZURE_OPENAI_EMBEDDINGDEPLOYMENTID\"
        AZURE_OPENAI_DEPLOYMENT=\"$AZURE_OPENAI_COMPLETIONSDEPLOYMENTID\"
        AZURE_OPENAI_API_VERSION=\"2024-12-01-preview\"
        MCP_AUTH_SECRET_KEY=\"travel-mcp-server-jwt-secret-for-local-development\"
        MCP_AUTH_TOKEN=\"travel-server-dev-token-2024\"
        MCP_SERVER_BASE_URL=\"http://localhost:8080\"
        " > ./python/.env

        echo "✅ Environment file created at ./python/.env"

        # Create environment file for MCP server
        echo "
        COSMOSDB_ENDPOINT=\"$COSMOSDB_ENDPOINT\"
        COSMOS_DB_DATABASE_NAME=\"TravelAssistant\"
        AZURE_OPENAI_ENDPOINT=\"$AZURE_OPENAI_ENDPOINT\"
        AZURE_OPENAI_EMBEDDING_DEPLOYMENT=\"$AZURE_OPENAI_EMBEDDINGDEPLOYMENTID\"
        AZURE_OPENAI_DEPLOYMENT=\"$AZURE_OPENAI_COMPLETIONSDEPLOYMENTID\"
        AZURE_OPENAI_API_VERSION=\"2024-12-01-preview\"
        MCP_AUTH_SECRET_KEY=\"travel-mcp-server-jwt-secret-for-local-development\"
        MCP_AUTH_TOKEN=\"travel-server-dev-token-2024\"
        MCP_SERVER_BASE_URL=\"http://localhost:8080\"
        " > ./mcp_server/.env

        echo "✅ Environment file created at ./mcp_server/.env"

        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "📦 Setting up Python virtual environment..."
        echo "═══════════════════════════════════════════════════════════════"
        echo ""

        # Check if virtual environment exists, create if not
        if [ ! -d "venv" ]; then
            echo "Creating Python virtual environment..."
            python3 -m venv venv
        fi

        # Activate virtual environment
        echo "Activating virtual environment..."
        . venv/bin/activate

        # Install requirements
        echo "Installing Python dependencies from requirements.txt..."
        if [ -f "requirements.txt" ]; then
            python -m pip install --upgrade pip setuptools wheel
            python -m pip install --prefer-binary -r requirements.txt
        else
            echo "⚠️  requirements.txt not found, installing basic dependencies..."
            python -m pip install --upgrade pip setuptools wheel
            python -m pip install azure-cosmos azure-identity openai python-dotenv
        fi

        echo ""
        echo "═══════════════════════════════════════════════════════════════"
        echo "� Loading data into Cosmos DB..."
        echo "═══════════════════════════════════════════════════════════════"
        echo ""

        cd python
        # Load data into Cosmos DB (from python directory)
        python data/seed_data.py
        cd ..

        echo ""
        echo "✅ Setup complete!"
        echo ""
        echo "═══════════════════════════════════════════════════════════════"

    windows:
      shell: pwsh
      interactive: true
      continueOnError: false
      run: |
        echo "
        COSMOSDB_ENDPOINT=""$env:COSMOSDB_ENDPOINT""
        COSMOS_KEY=""$env:COSMOS_KEY""
        COSMOS_DB_DATABASE_NAME=""TravelAssistant""
        AZURE_OPENAI_ENDPOINT=""$env:AZURE_OPENAI_ENDPOINT""
        AZURE_OPENAI_EMBEDDING_DEPLOYMENT=""$env:AZURE_OPENAI_EMBEDDINGDEPLOYMENTID""
        AZURE_OPENAI_DEPLOYMENT=""$env:AZURE_OPENAI_COMPLETIONSDEPLOYMENTID""
        AZURE_OPENAI_API_VERSION=""2024-12-01-preview""
        MCP_AUTH_SECRET_KEY=""travel-mcp-server-jwt-secret-for-local-development""
        MCP_AUTH_TOKEN=""travel-server-dev-token-2024""
        MCP_SERVER_BASE_URL=""http://localhost:8080""
        " > ./python/.env

        Write-Host "✅ Environment file created at ./python/.env"

        # Create environment file for MCP server
        echo "
        COSMOSDB_ENDPOINT=""$env:COSMOSDB_ENDPOINT""
        COSMOS_KEY=""$env:COSMOS_KEY""
        COSMOS_DB_DATABASE_NAME=""TravelAssistant""
        AZURE_OPENAI_ENDPOINT=""$env:AZURE_OPENAI_ENDPOINT""
        AZURE_OPENAI_EMBEDDING_DEPLOYMENT=""$env:AZURE_OPENAI_EMBEDDINGDEPLOYMENTID""
        AZURE_OPENAI_DEPLOYMENT=""$env:AZURE_OPENAI_COMPLETIONSDEPLOYMENTID""
        AZURE_OPENAI_API_VERSION=""2024-12-01-preview""
        MCP_AUTH_SECRET_KEY=""travel-mcp-server-jwt-secret-for-local-development""
        MCP_AUTH_TOKEN=""travel-server-dev-token-2024""
        MCP_SERVER_BASE_URL=""http://localhost:8080""
        " > ./mcp_server/.env

        Write-Host "✅ Environment file created at ./mcp_server/.env"
        Write-Host ""
        Write-Host "═══════════════════════════════════════════════════════════════"
        Write-Host "📦 Setting up Python virtual environment..."
        Write-Host "═══════════════════════════════════════════════════════════════"
        Write-Host ""

        # Check if virtual environment exists, create if not
        if (-not (Test-Path "venv")) {
            Write-Host "Creating Python virtual environment..."
            python -m venv venv
        }

        # Activate virtual environment
        Write-Host "Activating virtual environment..."
        & ".\venv\Scripts\Activate.ps1"

        # Install requirements
        Write-Host "Installing Python dependencies from requirements.txt..."
        if (Test-Path "requirements.txt") {
            python -m pip install --upgrade pip setuptools wheel
            python -m pip install --prefer-binary -r requirements.txt
        } else {
            Write-Host "⚠️  requirements.txt not found, installing basic dependencies..."
            python -m pip install --upgrade pip setuptools wheel
            python -m pip install azure-cosmos azure-identity openai python-dotenv
        }

        Write-Host ""
        Write-Host "═══════════════════════════════════════════════════════════════"
        Write-Host "� Loading data into Cosmos DB..."
        Write-Host "═══════════════════════════════════════════════════════════════"
        Write-Host ""

        Set-Location python
        # Load data into Cosmos DB (from python directory)
        python data\seed_data.py
        Set-Location ..

        Write-Host ""
        Write-Host "✅ Setup complete!"
        Write-Host ""
        Write-Host "═══════════════════════════════════════════════════════════════"
  postdeploy:
    posix:
      shell: sh
      interactive: false
      continueOnError: true
      run: |
        echo "Restarting API container to establish fresh MCP session..."
        API_REVISION=$(az containerapp show --name $(az containerapp list -g "$RG_NAME" --query "[?tags.\"azd-service-name\"=='api'].name" -o tsv) -g "$RG_NAME" --query "properties.latestRevisionName" -o tsv 2>/dev/null)
        if [ -n "$API_REVISION" ]; then
          API_NAME=$(az containerapp list -g "$RG_NAME" --query "[?tags.\"azd-service-name\"=='api'].name" -o tsv)
          az containerapp revision restart --name "$API_NAME" -g "$RG_NAME" --revision "$API_REVISION"
          echo "✅ API container restarted with fresh MCP session"
        else
          echo "⚠️  Could not find API container app revision to restart"
        fi
    windows:
      shell: pwsh
      interactive: false
      continueOnError: true
      run: |
        Write-Host "Restarting API container to establish fresh MCP session..."
        $apiName = (az containerapp list -g "$env:RG_NAME" --query "[?tags.""azd-service-name""=='api'].name" -o tsv 2>$null)
        if ($apiName) {
          $revision = (az containerapp show --name $apiName -g "$env:RG_NAME" --query "properties.latestRevisionName" -o tsv 2>$null)
          if ($revision) {
            az containerapp revision restart --name $apiName -g "$env:RG_NAME" --revision $revision
            Write-Host "✅ API container restarted with fresh MCP session"
          }
        } else {
          Write-Host "⚠️  Could not find API container app to restart"
        }
